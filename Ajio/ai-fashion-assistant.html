<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AI Fashion Assistant — AJIO × JioBharatIQ</title>
<style>
@font-face{font-family:'JioType';font-weight:400;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:500;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:700;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:900;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2')}
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary-20:#e8e8fc;--primary-30:#9999ff;--primary-40:#6464ff;
  --primary-50:#3535f3;--primary-60:#000093;--primary-70:#00004c;
  --secondary-20:#fef7e9;--secondary-30:#ffe3ae;--secondary-50:#f7ab20;--secondary-60:#ac660c;--secondary-70:#7f4b10;
  --sparkle-20:#e8faf7;--sparkle-30:#a7f6e9;--sparkle-50:#1eccb0;--sparkle-60:#1e7b74;--sparkle-70:#0e5c4f;
  --error:#fa2f40;--warning:#f06d0f;--success:#25ab21;
  --grey-100:#141414;--grey-80:rgba(0,0,0,0.66);--grey-60:#b5b5b5;--grey-40:#e0e0e0;--grey-20:#f5f5f5;--white:#ffffff;
  --surface-ghost:#eeeeef;--surface-ghost-icon:#e7e9ff;--surface-bold:#3900ad;--surface-minimal:#f5f5f5;--surface-moderate:#e3e3e4;
  --text-high:#141414;--text-low:rgba(25,27,30,0.65);--text-disabled:rgba(25,27,30,0.38);--text-on-bold:#ffffff;
  --icon-medium:#170054;--icon-high:#141414;
  --stroke-subtle:rgba(36,38,43,0.12);--stroke-minimal:rgba(36,38,43,0.13);
  --shape-sm:8px;--shape-md:12px;--shape-lg:16px;--shape-pill:999px;
  --spacing-xs:8px;--spacing-s:12px;--spacing-m:16px;--spacing-l:20px;--spacing-xl:24px;
}
body{font-family:'JioType',sans-serif;background:var(--grey-20);-webkit-font-smoothing:antialiased;overflow:hidden}
.phone-frame{width:100%;max-width:390px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;background:var(--white);position:relative;overflow:hidden}
@media(min-width:768px){body{display:flex;align-items:center;justify-content:center}.phone-frame{height:844px;border-radius:32px;box-shadow:0 25px 60px rgba(0,0,0,0.15)}}

/* Status Bar */
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 4px;flex-shrink:0;background:var(--white)}
.status-time{font-size:15px;font-weight:700;color:var(--text-high)}
.status-icons{display:flex;align-items:center;gap:6px}
.status-icons svg{width:16px;height:16px;color:var(--text-high)}

/* Header */
.header-nav{display:flex;align-items:center;padding:8px 16px 12px;gap:12px;flex-shrink:0;background:var(--white);border-bottom:1px solid var(--stroke-subtle)}
.back-btn{width:32px;height:32px;border-radius:var(--shape-pill);border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-high)}
.back-btn:active{background:var(--surface-ghost)}
.back-btn svg{width:20px;height:20px}
.hn-center{flex:1;padding:0 8px}
.hn-title{font-size:16px;font-weight:700;color:var(--text-high);letter-spacing:-0.03em}
.hn-sub{font-size:13px;font-weight:500;color:var(--text-low)}

/* Chat Container */
.chat-container{flex:1;overflow-y:auto;padding:var(--spacing-m);display:flex;flex-direction:column;gap:var(--spacing-s);scroll-behavior:smooth}
.chat-container::-webkit-scrollbar{display:none}

/* Messages */
.msg-row{display:flex;gap:var(--spacing-xs);max-width:100%}
.msg-row.ai{align-items:flex-start}
.msg-row.user{justify-content:flex-end}
.msg-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;background:var(--primary-20)}
.msg-avatar video{width:100%;height:100%;object-fit:cover}
.msg-avatar svg{width:16px;height:16px;color:var(--primary-50)}
.msg-content{display:flex;flex-direction:column;gap:6px;max-width:85%}
.msg-bubble{padding:10px 14px;border-radius:var(--shape-lg);font-size:15px;font-weight:500;line-height:1.5;max-width:100%}
.msg-row.ai .msg-bubble{background:var(--surface-ghost);color:var(--text-high);border-bottom-left-radius:4px}
.msg-row.user .msg-bubble{background:var(--primary-50);color:var(--white);border-bottom-right-radius:4px}

/* Typing */
.typing-row{display:flex;gap:var(--spacing-xs);align-items:flex-start}
.typing-dots{display:flex;gap:4px;padding:12px 14px;background:var(--surface-ghost);border-radius:var(--shape-lg);border-bottom-left-radius:4px}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--grey-60);animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-6px);opacity:1}}

/* Chips */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0;padding-left:36px}
.chip{padding:6px 12px;border-radius:var(--shape-pill);font-size:12px;font-weight:700;font-family:'JioType',sans-serif;cursor:pointer;border:none;transition:transform 0.15s;white-space:nowrap}
.chip:active{transform:scale(0.96)}
.chip-primary{background:var(--primary-50);color:var(--white)}
.chip-secondary{background:var(--surface-ghost);color:var(--text-high)}
.chip-sparkle{background:var(--sparkle-20);color:var(--sparkle-70)}
.chip-outline{background:var(--white);color:var(--text-high);border:1.5px solid var(--stroke-subtle)}
.chip-outline:hover{border-color:var(--primary-30);background:var(--primary-20)}

/* Animations */
.card-wrap{animation:cardUp 0.4s ease-out;width:100%}
@keyframes cardUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Category Cards */
.cat-cards{display:flex;flex-direction:column;gap:var(--spacing-xs);width:100%}
.cat-card{display:flex;align-items:center;gap:var(--spacing-s);padding:14px;background:var(--white);border:1.5px solid var(--stroke-subtle);border-radius:var(--shape-lg);cursor:pointer;transition:all 0.15s}
.cat-card:active{transform:scale(0.98);border-color:var(--primary-50)}
.cat-card-icon{width:44px;height:44px;border-radius:var(--shape-md);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cat-card-icon svg{width:22px;height:22px}
.cat-card-text{flex:1}
.cat-card-title{font-size:15px;font-weight:700;color:var(--text-high)}
.cat-card-sub{font-size:13px;font-weight:500;color:var(--text-low);margin-top:2px}
.cat-card-arrow svg{width:18px;height:18px;color:var(--grey-60)}

/* Product Cards */
.product-grid{display:flex;gap:10px;overflow-x:auto;padding:4px 0;width:100%;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.product-grid::-webkit-scrollbar{display:none}
.product-card{min-width:160px;max-width:160px;border-radius:var(--shape-lg);overflow:hidden;border:1px solid var(--stroke-subtle);background:var(--white);flex-shrink:0;scroll-snap-align:start;cursor:pointer;transition:transform 0.15s;display:flex;flex-direction:column}
.product-card:active{transform:scale(0.97)}
.product-card-img{width:100%;height:180px;object-fit:cover;background:var(--grey-20);display:block}
.product-card-body{padding:10px;display:flex;flex-direction:column;flex:1}
.product-card-brand{font-size:10px;font-weight:700;color:var(--text-low);text-transform:uppercase;letter-spacing:0.5px}
.product-card-name{font-size:13px;font-weight:700;color:var(--text-high);margin-top:2px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-card-meta{display:flex;align-items:center;gap:6px;margin-top:4px}
.product-card-price{font-size:14px;font-weight:900;color:var(--text-high)}
.product-card-mrp{font-size:11px;font-weight:500;color:var(--text-disabled);text-decoration:line-through}
.product-card-discount{font-size:10px;font-weight:700;color:var(--warning)}
.product-card-rating{display:flex;align-items:center;gap:2px;margin-top:4px;font-size:11px;font-weight:700;color:var(--secondary-60)}
.product-card-rating svg{width:11px;height:11px;color:var(--secondary-50)}
.product-card-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:0.3px;background:var(--sparkle-20);color:var(--sparkle-70);margin-top:4px}
.product-card-cta{width:100%;padding:8px;border-radius:var(--shape-sm);border:1.5px solid var(--primary-50);background:var(--white);color:var(--primary-50);font-size:12px;font-weight:700;font-family:'JioType',sans-serif;cursor:pointer;margin-top:auto;padding-top:8px;transition:all 0.15s}
.product-card-cta:active{background:var(--primary-50);color:var(--white)}

/* Lookbook Card */
.lookbook-card{background:var(--white);border:1px solid var(--stroke-subtle);border-radius:var(--shape-lg);overflow:hidden;width:100%}
.lookbook-header{padding:14px;display:flex;align-items:center;gap:10px;background:var(--grey-20);border-bottom:1px solid var(--stroke-subtle)}
.lookbook-header-icon{width:36px;height:36px;border-radius:var(--shape-sm);background:var(--primary-20);display:flex;align-items:center;justify-content:center}
.lookbook-header-icon svg{width:18px;height:18px;color:var(--primary-50)}
.lookbook-header-text{flex:1}
.lookbook-header-title{font-size:14px;font-weight:700;color:var(--text-high)}
.lookbook-header-sub{font-size:11px;font-weight:500;color:var(--text-low);margin-top:1px}
.lookbook-hero{width:100%;height:220px;background:var(--grey-20);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.lookbook-hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:100%;height:100%}
.lookbook-hero-grid img{width:100%;height:100%;object-fit:cover}
.lookbook-tag{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,0.7);color:var(--white);font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--shape-pill)}
.lookbook-items{padding:0}
.lookbook-item{display:flex;align-items:center;padding:10px 14px;gap:10px;border-bottom:1px solid var(--stroke-subtle)}
.lookbook-item:last-child{border-bottom:none}
.lookbook-item-thumb{width:44px;height:44px;border-radius:var(--shape-sm);background:var(--grey-20);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;letter-spacing:-0.5px}
.lookbook-item-thumb img{width:100%;height:100%;object-fit:cover}
.lookbook-item-info{flex:1;min-width:0}
.lookbook-item-name{font-size:13px;font-weight:700;color:var(--text-high);line-height:1.3}
.lookbook-item-brand{font-size:11px;font-weight:500;color:var(--text-low);margin-top:1px}
.lookbook-item-price{text-align:right;flex-shrink:0}
.lookbook-item-price-val{font-size:14px;font-weight:700;color:var(--text-high)}
.lookbook-item-price-mrp{font-size:11px;font-weight:500;color:var(--text-disabled);text-decoration:line-through}
.lookbook-total{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;background:var(--grey-20);border-top:1px solid var(--stroke-subtle)}
.lookbook-total-label{font-size:13px;font-weight:700;color:var(--text-high)}
.lookbook-total-val{font-size:18px;font-weight:900;color:var(--primary-50)}
.lookbook-total-save{font-size:11px;font-weight:700;color:var(--success);margin-top:2px}
.lookbook-cta{display:flex;gap:8px;padding:0 14px 14px}
.lookbook-cta-btn{flex:1;padding:10px;border-radius:var(--shape-pill);font-size:13px;font-weight:700;font-family:'JioType',sans-serif;cursor:pointer;text-align:center;transition:transform 0.15s}
.lookbook-cta-btn:active{transform:scale(0.96)}
.lookbook-cta-primary{background:var(--primary-50);color:var(--white);border:none}
.lookbook-cta-secondary{background:var(--white);color:var(--primary-50);border:1.5px solid var(--primary-50)}

/* Try-On Card */
.tryon-card{background:var(--white);border:1px solid var(--stroke-subtle);border-radius:var(--shape-lg);overflow:hidden;width:100%}
.tryon-header{padding:14px;display:flex;align-items:center;gap:10px;background:var(--sparkle-20);border-bottom:1px solid var(--stroke-subtle)}
.tryon-header-icon{width:36px;height:36px;border-radius:var(--shape-sm);background:var(--sparkle-50);display:flex;align-items:center;justify-content:center}
.tryon-header-icon svg{width:18px;height:18px;color:var(--white)}
.tryon-header-title{font-size:14px;font-weight:700;color:var(--sparkle-70)}
/* tryon-result removed — now using inline full-body single image */
.tryon-fit{padding:12px 14px;background:var(--secondary-20);display:flex;align-items:flex-start;gap:8px}
.tryon-fit-icon{flex-shrink:0;margin-top:1px}
.tryon-fit-icon svg{width:16px;height:16px;color:var(--secondary-60)}
.tryon-fit-text{font-size:13px;font-weight:500;color:var(--secondary-70);line-height:1.4}
.tryon-fit-text b{font-weight:700}
.tryon-product{padding:12px 14px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--stroke-subtle)}
.tryon-product-info{flex:1}
.tryon-product-name{font-size:14px;font-weight:700;color:var(--text-high)}
.tryon-product-brand{font-size:12px;font-weight:500;color:var(--text-low);margin-top:1px}
.tryon-product-price{font-size:16px;font-weight:900;color:var(--primary-50)}
.tryon-cta{display:flex;gap:8px;padding:0 14px 14px}

/* Voice Listening Overlay */
.voice-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--white);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;animation:fadeIn 0.3s ease-out}
.voice-overlay video{width:120px;height:120px;border-radius:50%;object-fit:cover}
.voice-overlay-text{font-size:18px;font-weight:700;color:var(--text-high);text-align:center;padding:0 40px}
.voice-overlay-sub{font-size:14px;font-weight:500;color:var(--text-low)}
.voice-transcript{font-size:16px;font-weight:700;color:var(--primary-50);animation:fadeIn 0.4s ease-out;text-align:center;padding:0 40px}
.voice-cancel{padding:10px 24px;border-radius:var(--shape-pill);border:1.5px solid var(--stroke-subtle);background:var(--white);font-size:14px;font-weight:700;font-family:'JioType',sans-serif;cursor:pointer;color:var(--text-high);margin-top:20px}

/* Generating Progress */
.gen-card{background:var(--white);border:1px solid var(--stroke-subtle);border-radius:var(--shape-lg);padding:20px;width:100%;text-align:center}
.gen-progress{width:100%;height:4px;background:var(--grey-40);border-radius:2px;overflow:hidden;margin-top:12px}
.gen-progress-bar{height:100%;background:var(--sparkle-50);border-radius:2px;animation:genProgress 3s ease-out forwards}
@keyframes genProgress{from{width:0%}to{width:100%}}
.gen-label{font-size:13px;font-weight:700;color:var(--text-low);margin-top:8px}
.gen-icon{margin-bottom:8px}
.gen-icon svg{width:32px;height:32px;color:var(--sparkle-50);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.1)}}

/* Profile Card */
.profile-card{background:var(--sparkle-20);border-radius:var(--shape-lg);padding:14px;width:100%;display:flex;align-items:center;gap:12px}
.profile-icon{width:40px;height:40px;border-radius:50%;background:var(--sparkle-50);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.profile-icon svg{width:20px;height:20px;color:var(--white)}
.profile-text{flex:1;font-size:13px;font-weight:500;line-height:1.4;color:var(--sparkle-70)}
.profile-text b{font-weight:700}

/* Quiz Chips */
.quiz-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:var(--spacing-m)}
.quiz-chip{padding:8px 14px;border-radius:var(--shape-pill);font-size:13px;font-weight:700;font-family:'JioType',sans-serif;cursor:pointer;border:1.5px solid var(--stroke-subtle);background:var(--white);color:var(--text-high);transition:all 0.15s}
.quiz-chip.selected{background:var(--primary-20);border-color:var(--primary-50);color:var(--primary-50)}
.quiz-chip:active{transform:scale(0.96)}

/* Skeleton Shimmer */
.skeleton{background:var(--grey-20);border-radius:var(--shape-sm);position:relative;overflow:hidden}
.skeleton::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);animation:shimmer 1.5s infinite}
@keyframes shimmer{to{left:100%}}

/* Voice Bubble (user voice message) */
.voice-bubble{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--shape-lg);border-bottom-right-radius:4px;background:var(--primary-50);color:var(--white)}
.voice-wave{display:flex;align-items:center;gap:2px;height:20px}
.voice-wave span{width:3px;border-radius:2px;background:var(--white);animation:wave 0.8s ease-in-out infinite}
.voice-wave span:nth-child(1){height:8px;animation-delay:0s}
.voice-wave span:nth-child(2){height:14px;animation-delay:0.1s}
.voice-wave span:nth-child(3){height:20px;animation-delay:0.2s}
.voice-wave span:nth-child(4){height:12px;animation-delay:0.3s}
.voice-wave span:nth-child(5){height:6px;animation-delay:0.4s}
@keyframes wave{0%,100%{transform:scaleY(0.5)}50%{transform:scaleY(1)}}
.voice-label{font-size:14px;font-weight:700}

/* Product Row (cart-style) */
.prod-row{display:flex;align-items:center;padding:10px 14px;gap:10px;border-bottom:1px solid var(--stroke-subtle)}
.prod-row:last-of-type{border-bottom:none}
.prod-thumb{width:48px;height:48px;border-radius:var(--shape-sm);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--white);letter-spacing:-0.5px;overflow:hidden}
.prod-thumb img{width:100%;height:100%;object-fit:cover}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:13px;font-weight:700;color:var(--text-high);line-height:1.3}
.prod-variant{font-size:11px;font-weight:500;color:var(--text-low);margin-top:1px}
.prod-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.prod-rating{display:flex;align-items:center;gap:2px;font-size:11px;font-weight:700;color:var(--secondary-60)}
.prod-rating svg{width:12px;height:12px;color:var(--secondary-50)}
.prod-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:0.3px;background:var(--sparkle-20);color:var(--sparkle-70)}
.prod-price-col{text-align:right;flex-shrink:0}
.prod-price{font-size:14px;font-weight:700;color:var(--text-high)}
.prod-mrp{font-size:11px;font-weight:500;color:var(--text-disabled);text-decoration:line-through}

/* Cart Card */
.cart-card{background:var(--white);border:1px solid var(--stroke-subtle);border-radius:var(--shape-lg);overflow:hidden;width:100%}
.cart-header{padding:var(--spacing-s) 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--stroke-subtle);background:var(--grey-20)}
.cart-header-left{display:flex;align-items:center;gap:var(--spacing-xs)}
.cart-header-left svg{width:18px;height:18px;color:var(--primary-50)}
.cart-header-left span{font-size:14px;font-weight:700}
.cart-count{font-size:12px;font-weight:700;color:var(--primary-50);background:var(--primary-20);padding:2px 8px;border-radius:var(--shape-pill)}
.cart-total{padding:var(--spacing-s) 14px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--stroke-subtle);background:var(--grey-20)}
.cart-total-label{font-size:14px;font-weight:700}
.cart-total-sub{font-size:11px;font-weight:500;color:var(--text-low)}
.cart-total-price{font-size:18px;font-weight:900;color:var(--primary-50);letter-spacing:-0.03em}

/* Ingredient/Why Card */
.why-card{background:var(--primary-20);border-radius:var(--shape-lg);padding:14px;width:100%}
.why-title{font-size:13px;font-weight:700;color:var(--primary-60);margin-bottom:8px}
.why-item{display:flex;gap:8px;margin-bottom:6px;font-size:13px;font-weight:500;line-height:1.4;color:var(--text-high)}
.why-bullet{color:var(--primary-50);flex-shrink:0;font-weight:700}

/* Bottom Widget (JDS ChatInput) */
.bottom-widget{padding:8px var(--spacing-s) 12px;background:var(--white);flex-shrink:0}
.bw-container{background:var(--surface-ghost);border-radius:24px;padding:4px;display:flex;flex-direction:column}
.bw-input{padding:10px 12px 4px}
.bw-real-input{width:100%;border:none;outline:none;font-family:'JioType',sans-serif;font-size:14px;color:var(--text-high);background:transparent}
.bw-real-input::placeholder{color:var(--text-low)}
.bw-actions{display:flex;justify-content:space-between;align-items:center;height:40px;padding:0 4px}
.bw-left{display:flex;gap:2px}
.wib{width:36px;height:36px;border-radius:var(--shape-pill);display:flex;align-items:center;justify-content:center;background:transparent;border:none;cursor:pointer;color:var(--grey-80)}
.wib:active{background:var(--surface-moderate)}
.wib svg{width:20px;height:20px}
.bw-send{width:36px;height:36px;border-radius:50%;border:none;background:var(--primary-50);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.bw-send svg{width:18px;height:18px;fill:var(--white)}
.bw-send.hidden-send{display:none}
.speak-btn{background:var(--primary-50);border:none;border-radius:var(--shape-pill);padding:10px 18px;display:flex;align-items:center;gap:6px;cursor:pointer}
.speak-btn svg{width:16px;height:16px;fill:var(--white)}
.speak-btn span{font-family:'JioType',sans-serif;font-weight:700;font-size:14px;color:var(--white)}

/* Payment Card */
.payment-card{background:var(--white);border:1px solid var(--stroke-subtle);border-radius:var(--shape-lg);overflow:hidden;width:100%}
.pay-header{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid var(--stroke-subtle);background:var(--grey-20)}
.pay-header svg{width:20px;height:20px;color:var(--primary-50)}
.pay-header-text{flex:1}
.pay-header-title{font-size:14px;font-weight:700}
.pay-header-sub{font-size:11px;font-weight:500;color:var(--text-low)}
.pay-amount{display:flex;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--stroke-subtle)}
.pay-amount-label{font-size:13px;font-weight:500;color:var(--text-low)}
.pay-amount-val{font-size:18px;font-weight:900;color:var(--primary-50)}
.pay-methods{padding:8px 14px}
.pay-method{display:flex;align-items:center;gap:10px;padding:10px 0;cursor:pointer;border-bottom:1px solid var(--stroke-subtle)}
.pay-method:last-child{border-bottom:none}
.pay-method-icon{width:40px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0}
.pay-method-info{flex:1}
.pay-method-name{font-size:13px;font-weight:700;color:var(--text-high)}
.pay-method-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px}
.pay-method-detail{font-size:11px;font-weight:500;color:var(--text-low);margin-top:1px}
.pay-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--grey-40);flex-shrink:0;position:relative}
.pay-method.selected .pay-radio{border-color:var(--primary-50)}
.pay-method.selected .pay-radio::after{content:'';position:absolute;top:3px;left:3px;width:8px;height:8px;border-radius:50%;background:var(--primary-50)}
.pay-footer{padding:14px}
.pay-btn{width:100%;padding:12px;border-radius:var(--shape-pill);border:none;background:var(--primary-50);color:var(--white);font-size:15px;font-weight:700;font-family:'JioType',sans-serif;cursor:pointer}
.pay-btn:active{opacity:0.85}
.pay-secured{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:8px;font-size:11px;font-weight:500;color:var(--text-low)}
.pay-secured svg{width:12px;height:12px;color:var(--success)}

/* Order Success */
.success-card{background:var(--sparkle-20);border-radius:var(--shape-lg);padding:20px;width:100%;text-align:center}
.success-card svg{width:40px;height:40px;color:var(--success);margin-bottom:8px}
.success-card-title{font-size:16px;font-weight:900;color:var(--sparkle-70)}
.success-card-sub{font-size:13px;font-weight:500;color:var(--sparkle-60);margin-top:4px;line-height:1.4}

/* Feedback row */
.fb-row{display:flex;gap:4px;padding-left:36px}
.fb-btn{width:28px;height:28px;border-radius:var(--shape-pill);border:1px solid var(--stroke-subtle);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer}
.fb-btn:active{background:var(--surface-ghost)}
.fb-btn svg{width:14px;height:14px;color:var(--grey-60)}
</style>
</head>

function addAI(html, noAv) {
  const r = document.createElement('div'); r.className = 'msg-row ai fade-in';
  r.innerHTML = `${noAv ? '<div style="width:28px;flex-shrink:0"></div>' : AVATAR}<div class="msg-content"><div class="msg-bubble">${html}</div></div>`;

function addUser(text) {

function toggleSendBtn() {

function goBack() {

async function backToUseCases() {
  clearChips();

// Default quiz for product types without specific steps
const defaultQuiz = [
  { q: 'What style?', key: 'style', opts: ['Classic', 'Trendy', 'Minimal', 'Statement'] },
  { q: 'Preferred color?', key: 'color', opts: ['Gold', 'Silver', 'Black', 'Any'] },
  { q: 'Your budget?', key: 'budget', opts: ['Under \u20B9500', '\u20B9500\u20131000', '\u20B91000\u20132000', '\u20B92000+'] },
];

let isRefine = false;
const skipOnRefine = ['size', 'budget']; // These stick from first search

async function startDiscoveryQuiz(type) {
  if (discoverPrefs.type === type && discoverPrefs.size) {
    // Refine mode — keep size & budget, only re-ask style & color
    isRefine = true;
    showTyping(); await delay(400); hideTyping();
    addAI('Let\u2019s refine! Your size <b>' + (discoverPrefs.size||'') + '</b> and budget <b>' + (discoverPrefs.budget||'') + '</b> are saved.');
    await delay(300);
  } else {
    isRefine = false;
    discoverPrefs = { type: type };
  }
  const steps = quizSteps[type] || defaultQuiz;
  await runQuizStep(type, steps, 0);
}

async function runQuizStep(type, steps, idx) {
  if (idx >= steps.length) {
    isRefine = false;
    await showDiscoveryResults(type);
    return;
  }
  const step = steps[idx];
  // Skip size & budget on refine if already set
  if (isRefine && skipOnRefine.includes(step.key) && discoverPrefs[step.key]) {
    await runQuizStep(type, steps, idx + 1);
    return;
  }
  if (idx === 0 || (isRefine && !skipOnRefine.includes(step.key))) {
    showTyping(); await delay(400); hideTyping();
  }
  addAI(step.q, idx > 0 && !isRefine);
  await delay(200);
  addChips(step.opts.map(o => ({
    label: o, style: 'chip-outline',
    action: `quizAnswer('${type}',${idx},'${o.replace(/'/g,"\\'")}')`
  })));
}

async function quizAnswer(type, idx, answer) {
  clearChips();
  const steps = quizSteps[type] || defaultQuiz;
  discoverPrefs[steps[idx].key] = answer;
  addUser(answer);
  await delay(300);
  await runQuizStep(type, steps, idx + 1);
}

async function showDiscoveryResults(type) {
  showTyping(); await delay(1200); hideTyping();

/* ══════════════════════════════════════════════
   CROSS-LINKING BETWEEN FLOWS
   ══════════════════════════════════════════════ */
async function crossLinkTryOn(item) {
  clearChips();
  addUser('Try this on');
  showTyping(); await delay(600); hideTyping();
  addAI('Tap on the product you\u2019d like to try on:');
  // Make all product cards tappable for try-on
  enableTryOnMode();
}

function enableTryOnMode() {
  const pool = window._lastResults || (activeCat === 'footwear' ? products.sneakers : products.kurtas);
  document.querySelectorAll('.product-card').forEach((card, i) => {
    if (i >= pool.length) return;
    card.style.outline = '2px solid var(--sparkle-50)';
    card.style.cursor = 'pointer';
    card.onclick = function(e) {
      e.stopPropagation();
      document.querySelectorAll('.product-card').forEach(c => { c.style.outline = ''; c.onclick = null; });
      const p = pool[i];
      selectProductForTryOn(p);
    };
  });
}

async function selectProductForTryOn(p) {
  tryOnInProgress = false;
  addUser(p.name);
  showTyping(); await delay(600); hideTyping();
  addAI(`The <b>${p.name}</b> by ${p.brand} (\u20B9${p.price}). How would you like to try it on?`);
  await delay(300);
  window._tryOnProduct = { name: p.name, brand: p.brand, price: p.price };
  addChips([
    { label: 'Use profile photo', style: 'chip-primary', action: "generateTryOnFromProduct('profile')" },
    { label: 'Take new selfie', style: 'chip-outline', action: "generateTryOnFromProduct('selfie')" },
  ]);
}

async function generateTryOnFromProduct(mode) {
  const p = window._tryOnProduct || { name: 'Selected Item', brand: 'AJIO', price: 599 };
  products.tryonProducts.push({ id: '_selected', name: p.name, brand: p.brand, price: p.price, color: '#E3F2FD' });
  await generateTryOn('_selected', mode);
  products.tryonProducts = products.tryonProducts.filter(t => t.id !== '_selected');
}

/* ══════════════════════════════════════════════
   TEXT INPUT HANDLER
   ══════════════════════════════════════════════ */
function handleSend() {
  const text = chatInput.value.trim(); if (!text) return;
  chatInput.value = ''; toggleSendBtn();
  const lower = text.toLowerCase();

  if (lower.includes('kurta') || lower.includes('shirt') || lower.includes('dress')) {
    addUser(text); triggerVoiceFlow('kurta');
  } else if (lower.includes('sneaker') || lower.includes('shoe') || lower.includes('nike')) {
    addUser(text); triggerVoiceFlow('sneakers');
  } else if (lower.includes('diwali') || lower.includes('outfit') || lower.includes('suggest')) {
    addUser(text); styleAdvisorFlow('diwali');
  } else if (lower.includes('try on') || lower.includes('try-on') || lower.includes('kaisa lagega')) {
    addUser(text); startTryOn('clothing');
  } else {
    addUser(text);
    showTyping();
    setTimeout(() => {
      hideTyping();
      addAI('I can help with that! Try browsing our categories or use voice search to find exactly what you need.');
      showWelcomeCards();
    }, 1000);
  }
}
