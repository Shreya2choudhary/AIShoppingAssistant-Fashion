<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Beauty Assistant — Shopping</title>
<style>
@font-face { font-family: 'JioType'; font-weight: 400; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 900; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

:root {
  --primary-20: #e8e8fc; --primary-30: #9999ff; --primary-40: #6464ff;
  --primary-50: #3535f3; --primary-60: #000093; --primary-70: #00004c;
  --secondary-20: #fef7e9; --secondary-50: #f7ab20; --secondary-60: #ac660c;
  --sparkle-20: #e8faf7; --sparkle-50: #1eccb0; --sparkle-60: #1e7b74; --sparkle-70: #0e5c4f;
  --error: #fa2f40; --warning: #f06d0f; --success: #25ab21;
  --grey-100: #141414; --grey-80: rgba(0,0,0,0.66); --grey-60: #b5b5b5;
  --grey-40: #e0e0e0; --grey-20: #f5f5f5; --white: #ffffff;
  --surface-ghost: #eeeeef; --surface-ghost-icon: #e7e9ff;
  --surface-bold: #3900ad; --surface-minimal: #f5f5f5;
  --text-high: #141414; --text-low: rgba(25,27,30,0.65);
  --text-disabled: rgba(25,27,30,0.38); --text-on-bold: #ffffff;
  --icon-medium: #170054; --icon-high: #141414;
  --stroke-subtle: rgba(36,38,43,0.12); --stroke-minimal: rgba(36,38,43,0.13);
  --shape-sm: 8px; --shape-md: 12px; --shape-lg: 16px; --shape-pill: 999px;
  --spacing-xs: 8px; --spacing-s: 12px; --spacing-m: 16px; --spacing-l: 20px; --spacing-xl: 24px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'JioType', sans-serif; background: #f0f0f0; color: var(--text-high); height: 100dvh; overflow: hidden; }

.phone-frame {
  width: 100%; max-width: 390px; height: 100dvh; margin: 0 auto;
  display: flex; flex-direction: column; background: var(--white);
  position: relative; overflow: hidden;
}
@media (min-width: 768px) {
  body { display: flex; align-items: center; justify-content: center; }
  .phone-frame { height: 844px; border-radius: 32px; box-shadow: 0 25px 60px rgba(0,0,0,0.15); }
}

/* === STATUS BAR === */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 20px 4px; flex-shrink: 0; background: var(--white);
}
.status-time { font-size: 15px; font-weight: 700; color: var(--text-high); }
.status-icons { display: flex; align-items: center; gap: 6px; }
.status-icons svg { width: 16px; height: 16px; color: var(--text-high); }

/* === HEADER NAV === */
.header-nav {
  display: flex; align-items: center; padding: 8px 12px 12px;
  border-bottom: 1px solid var(--stroke-subtle); flex-shrink: 0; background: var(--white);
  position: sticky; top: 0; z-index: 10;
}
.hn-back { width: 36px; height: 36px; border-radius: 50%; background: transparent;
  border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.hn-back svg { width: 20px; height: 20px; color: var(--icon-high); }
.hn-center { flex: 1; padding: 0 8px; }
.hn-title { font-size: 16px; font-weight: 700; color: var(--text-high); letter-spacing: -0.03em; }
.hn-sub { font-size: 13px; font-weight: 500; color: var(--text-low); }
.hn-right { display: flex; gap: 4px; }
.hn-icon-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--surface-ghost);
  border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.hn-icon-btn svg { width: 18px; height: 18px; color: var(--icon-medium); }

/* === CHAT === */
.chat-container {
  flex: 1; overflow-y: auto; padding: var(--spacing-m);
  display: flex; flex-direction: column; gap: var(--spacing-s); scroll-behavior: smooth;
}
.chat-container::-webkit-scrollbar { display: none; }

.msg-row { display: flex; gap: var(--spacing-xs); max-width: 100%; }
.msg-row.ai { align-items: flex-start; }
.msg-row.user { justify-content: flex-end; }
.msg-avatar {
  width: 28px; height: 28px; border-radius: 50%; background: var(--primary-20);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
}
.msg-avatar svg { width: 16px; height: 16px; color: var(--primary-50); }
.msg-avatar video { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
.msg-content { display: flex; flex-direction: column; gap: 6px; max-width: 85%; }
.msg-bubble {
  padding: 10px 14px; border-radius: var(--shape-lg); font-size: 15px; font-weight: 500;
  line-height: 1.5; max-width: 100%;
}
.msg-row.ai .msg-bubble { background: var(--surface-ghost); color: var(--text-high); border-bottom-left-radius: 4px; }
.msg-row.user .msg-bubble { background: var(--primary-50); color: var(--white); border-bottom-right-radius: 4px; }

/* Voice bubble */
.voice-bubble {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  background: var(--primary-50); color: var(--white); border-radius: var(--shape-lg); border-bottom-right-radius: 4px;
}
.voice-wave { display: flex; align-items: center; gap: 2px; height: 20px; }
.voice-wave span { width: 3px; border-radius: 2px; background: rgba(255,255,255,0.7); animation: vwave 0.8s infinite ease-in-out; }
.voice-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
.voice-wave span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
.voice-wave span:nth-child(3) { height: 20px; animation-delay: 0.2s; }
.voice-wave span:nth-child(4) { height: 12px; animation-delay: 0.3s; }
.voice-wave span:nth-child(5) { height: 6px; animation-delay: 0.4s; }
@keyframes vwave { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(1)} }
.voice-label { font-size: 13px; font-weight: 700; }

/* Typing indicator */
.typing-row { display: flex; gap: var(--spacing-xs); align-items: flex-start; }
.typing-dots { display: flex; gap: 4px; padding: 12px 14px; background: var(--surface-ghost); border-radius: var(--shape-lg); border-bottom-left-radius: 4px; }
.typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--grey-60); animation: bounce 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }

/* === CARDS === */
.card-wrap { animation: cardUp 0.4s ease-out; width: 100%; }
@keyframes cardUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 0.3s ease-out; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* Category Cards */
.cat-cards { display: flex; flex-direction: column; gap: var(--spacing-xs); width: 100%; }
.cat-card {
  display: flex; align-items: center; gap: var(--spacing-s); padding: 14px;
  background: var(--white); border: 1.5px solid var(--stroke-subtle); border-radius: var(--shape-lg);
  cursor: pointer; transition: all 0.15s;
}
.cat-card:active { transform: scale(0.98); border-color: var(--primary-50); }
.cat-card-icon {
  width: 44px; height: 44px; border-radius: var(--shape-md); display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.cat-card-icon svg { width: 22px; height: 22px; }
.cat-card-text { flex: 1; }
.cat-card-title { font-size: 15px; font-weight: 700; color: var(--text-high); }
.cat-card-sub { font-size: 13px; font-weight: 500; color: var(--text-low); margin-top: 2px; }
.cat-card-arrow svg { width: 18px; height: 18px; color: var(--grey-60); }

/* Product cart card */
.cart-card {
  background: var(--white); border: 1px solid var(--stroke-subtle);
  border-radius: var(--shape-lg); overflow: hidden; width: 100%;
}
.cart-header {
  padding: var(--spacing-s) 14px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid var(--stroke-subtle); background: var(--grey-20);
}
.cart-header-left { display: flex; align-items: center; gap: var(--spacing-xs); }
.cart-header-left svg { width: 18px; height: 18px; color: var(--primary-50); }
.cart-header-left span { font-size: 14px; font-weight: 700; }
.cart-count { font-size: 12px; font-weight: 700; color: var(--primary-50); background: var(--primary-20); padding: 2px 8px; border-radius: var(--shape-pill); }

.prod-row {
  display: flex; align-items: center; padding: 10px 14px; gap: 10px;
  border-bottom: 1px solid var(--stroke-subtle);
}
.prod-row:last-of-type { border-bottom: none; }
.prod-thumb {
  width: 48px; height: 48px; border-radius: var(--shape-sm); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900;
  color: var(--white); letter-spacing: -0.5px;
}
.prod-info { flex: 1; min-width: 0; }
.prod-name { font-size: 13px; font-weight: 700; color: var(--text-high); line-height: 1.3; }
.prod-variant { font-size: 11px; font-weight: 500; color: var(--text-low); margin-top: 1px; }
.prod-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
.prod-rating { display: flex; align-items: center; gap: 2px; font-size: 11px; font-weight: 700; color: var(--secondary-60); }
.prod-rating svg { width: 12px; height: 12px; color: var(--secondary-50); }
.prod-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px; background: var(--sparkle-20); color: var(--sparkle-70); }
.prod-price-col { text-align: right; flex-shrink: 0; }
.prod-price { font-size: 14px; font-weight: 700; color: var(--text-high); }
.prod-mrp { font-size: 11px; font-weight: 500; color: var(--text-disabled); text-decoration: line-through; }

.cart-total {
  padding: var(--spacing-s) 14px; display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid var(--stroke-subtle); background: var(--grey-20);
}
.cart-total-left {}
.cart-total-label { font-size: 14px; font-weight: 700; }
.cart-total-sub { font-size: 11px; font-weight: 500; color: var(--text-low); }
.cart-total-price { font-size: 18px; font-weight: 900; color: var(--primary-50); letter-spacing: -0.03em; }
.cart-delivery {
  display: flex; align-items: center; gap: 4px; padding: 6px var(--spacing-s);
  background: var(--sparkle-20); font-size: 12px; font-weight: 700; color: var(--sparkle-70); justify-content: center;
}
.cart-delivery svg { width: 14px; height: 14px; }

/* Chips */
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; padding: 4px 0; }
.chip {
  padding: 6px 12px; border-radius: var(--shape-pill); font-size: 12px; font-weight: 700;
  font-family: 'JioType', sans-serif; cursor: pointer; border: none; transition: transform 0.15s; white-space: nowrap;
}
.chip:active { transform: scale(0.96); }
.chip-primary { background: var(--primary-50); color: var(--white); }
.chip-secondary { background: var(--surface-ghost); color: var(--text-high); }
.chip-sparkle { background: var(--sparkle-20); color: var(--sparkle-70); }
.chip-outline { background: var(--white); color: var(--text-high); border: 1.5px solid var(--stroke-subtle); }

/* Payment Card */
.payment-card {
  background: var(--white); border: 1px solid var(--stroke-subtle); border-radius: var(--shape-lg);
  overflow: hidden; width: 100%;
}
.pay-header { padding: 14px var(--spacing-m); border-bottom: 1px solid var(--stroke-subtle); display: flex; align-items: center; gap: 10px; }
.pay-header-text { flex: 1; }
.pay-header-title { font-size: 14px; font-weight: 700; }
.pay-header-sub { font-size: 12px; font-weight: 500; color: var(--text-low); margin-top: 1px; }
.pay-amount { display: flex; align-items: baseline; justify-content: space-between; padding: var(--spacing-s) var(--spacing-m); background: var(--grey-20); border-bottom: 1px solid var(--stroke-subtle); }
.pay-amount-label { font-size: 12px; font-weight: 500; color: var(--text-low); }
.pay-amount-val { font-size: 22px; font-weight: 900; }
.pay-methods { padding: 6px 0; }
.pay-method { display: flex; align-items: center; gap: var(--spacing-s); padding: var(--spacing-s) var(--spacing-m); cursor: pointer; transition: background 0.15s; }
.pay-method:hover { background: var(--grey-20); }
.pay-method-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; font-weight: 900; }
.pay-method-info { flex: 1; }
.pay-method-name { font-size: 14px; font-weight: 700; }
.pay-method-detail { font-size: 11px; font-weight: 500; color: var(--text-low); margin-top: 1px; }
.pay-method-tag { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px; margin-left: 6px; }
.pay-radio { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--grey-60); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.pay-method.selected .pay-radio { border-color: var(--primary-50); background: var(--primary-50); }
.pay-method.selected .pay-radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--white); }
.pay-footer { padding: var(--spacing-s) var(--spacing-m); border-top: 1px solid var(--stroke-subtle); }
.pay-btn { width: 100%; padding: 14px; border-radius: var(--shape-md); border: none; background: var(--primary-50); color: var(--white); font-size: 15px; font-weight: 700; font-family: 'JioType', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.pay-secured { display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 8px; font-size: 10px; font-weight: 500; color: var(--text-disabled); }

/* Order Confirm */
.confirm-card { background: var(--white); border: 1px solid var(--stroke-subtle); border-radius: var(--shape-lg); padding: 20px var(--spacing-m); text-align: center; width: 100%; }
.confirm-icon { width: 48px; height: 48px; border-radius: 50%; background: #e6f4e6; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
.confirm-icon svg { width: 28px; height: 28px; color: var(--success); }
.confirm-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.confirm-sub { font-size: 13px; font-weight: 500; color: var(--text-low); line-height: 1.5; }
.confirm-id { display: inline-block; background: var(--grey-20); padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; color: var(--text-low); margin-top: 8px; letter-spacing: 0.5px; }
.confirm-eta { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--stroke-subtle); }
.confirm-eta span { font-size: 14px; font-weight: 700; color: var(--success); }

/* Tracking */
.track-card { background: var(--white); border: 1px solid var(--stroke-subtle); border-radius: var(--shape-lg); padding: 14px; width: 100%; }
.track-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.track-header span { font-size: 14px; font-weight: 700; }
.track-steps { display: flex; flex-direction: column; }
.track-step { display: flex; align-items: flex-start; gap: 10px; padding-bottom: 14px; }
.track-step:last-child { padding-bottom: 0; }
.track-dot-col { display: flex; flex-direction: column; align-items: center; width: 20px; flex-shrink: 0; }
.track-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--grey-40); flex-shrink: 0; margin-top: 3px; }
.track-dot.done { background: var(--success); }
.track-dot.current { background: var(--primary-50); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(53,53,243,0.3)} 50%{box-shadow:0 0 0 6px rgba(53,53,243,0)} }
.track-line { width: 2px; flex: 1; background: var(--grey-40); min-height: 14px; }
.track-line.done { background: var(--success); }
.track-step-info { flex: 1; }
.track-step-title { font-size: 13px; font-weight: 700; }
.track-step-sub { font-size: 11px; font-weight: 500; color: var(--text-low); }

/* Notification Cards */
.notif-card { border-radius: var(--shape-lg); overflow: hidden; border: 1px solid var(--stroke-subtle); width: 100%; }
.notif-accent { padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
.notif-accent svg { width: 16px; height: 16px; flex-shrink: 0; }
.notif-accent-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
.notif-accent-time { margin-left: auto; font-size: 10px; font-weight: 500; opacity: 0.8; }
.notif-body { padding: 14px; background: var(--white); }
.notif-product { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.notif-product-info { flex: 1; min-width: 0; }
.notif-product-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
.notif-product-detail { font-size: 12px; font-weight: 500; color: var(--text-low); margin-top: 2px; }
.notif-context { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; border-radius: 10px; font-size: 12px; font-weight: 500; line-height: 1.4; margin-bottom: 12px; }
.notif-context svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }
.notif-actions { display: flex; gap: 8px; align-items: center; }
.notif-btn-primary { flex: 1; padding: 10px 16px; border-radius: var(--shape-md); border: none; font-size: 14px; font-weight: 700; font-family: 'JioType', sans-serif; cursor: pointer; color: var(--white); display: flex; align-items: center; justify-content: center; gap: 6px; }
.notif-btn-dismiss { padding: 10px 14px; border-radius: var(--shape-md); border: 1.5px solid var(--stroke-subtle); background: var(--white); color: var(--text-low); font-size: 13px; font-weight: 700; font-family: 'JioType', sans-serif; cursor: pointer; }
.notif-price { display: flex; align-items: baseline; gap: 6px; margin-bottom: 12px; }
.notif-price-now { font-size: 20px; font-weight: 900; }
.notif-price-was { font-size: 13px; font-weight: 500; color: var(--text-disabled); text-decoration: line-through; }
.notif-price-save { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 8px; }

/* Replenish type */
.notif-replenish .notif-accent { background: var(--primary-50); color: var(--white); }
.notif-replenish .notif-context { background: var(--primary-20); color: var(--primary-60); }
.notif-replenish .notif-context svg { color: var(--primary-50); }
.notif-replenish .notif-btn-primary { background: var(--primary-50); }

/* Price drop type */
.notif-pricedrop .notif-accent { background: var(--sparkle-50); color: var(--white); }
.notif-pricedrop .notif-context { background: var(--sparkle-20); color: var(--sparkle-70); }
.notif-pricedrop .notif-context svg { color: var(--sparkle-50); }
.notif-pricedrop .notif-btn-primary { background: var(--sparkle-50); }
.notif-pricedrop .notif-price-save { background: var(--sparkle-20); color: var(--sparkle-70); }

/* Bundle type */
.notif-bundle .notif-accent { background: var(--secondary-50); color: var(--white); }
.notif-bundle .notif-context { background: var(--secondary-20); color: var(--secondary-60); }
.notif-bundle .notif-context svg { color: var(--secondary-50); }
.notif-bundle .notif-btn-primary { background: var(--secondary-50); }

/* Quiz Card */
.quiz-card { background: var(--white); border: 1px solid var(--stroke-subtle); border-radius: var(--shape-lg); padding: var(--spacing-m); width: 100%; }
.quiz-title { font-size: 14px; font-weight: 700; margin-bottom: var(--spacing-s); }
.quiz-label { font-size: 13px; font-weight: 700; color: var(--text-low); margin-bottom: var(--spacing-xs); text-transform: uppercase; letter-spacing: 0.5px; }
.quiz-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: var(--spacing-m); }
.quiz-chip {
  padding: 8px 14px; border-radius: var(--shape-pill); font-size: 13px; font-weight: 700;
  font-family: 'JioType', sans-serif; cursor: pointer; border: 1.5px solid var(--stroke-subtle);
  background: var(--white); color: var(--text-high); transition: all 0.15s;
}
.quiz-chip.selected { background: var(--primary-20); border-color: var(--primary-50); color: var(--primary-50); }
.quiz-chip:active { transform: scale(0.96); }
.quiz-slider-wrap { margin-bottom: var(--spacing-m); }
.quiz-slider { width: 100%; -webkit-appearance: none; height: 4px; border-radius: 2px; background: var(--grey-40); outline: none; }
.quiz-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--primary-50); cursor: pointer; }
.quiz-budget-labels { display: flex; justify-content: space-between; margin-top: 6px; }
.quiz-budget-labels span { font-size: 11px; font-weight: 700; color: var(--text-low); }
.quiz-budget-val { text-align: center; font-size: 16px; font-weight: 900; color: var(--primary-50); margin-top: 6px; }
.quiz-submit { width: 100%; padding: 12px; border-radius: var(--shape-pill); border: none; background: var(--primary-50); color: var(--white); font-size: 15px; font-weight: 700; font-family: 'JioType', sans-serif; cursor: pointer; margin-top: 4px; }

/* Comparison Table */
.compare-card { background: var(--white); border: 1px solid var(--stroke-subtle); border-radius: var(--shape-lg); overflow: hidden; width: 100%; }
.compare-title { padding: 14px; font-size: 14px; font-weight: 700; border-bottom: 1px solid var(--stroke-subtle); background: var(--grey-20); display: flex; align-items: center; gap: 8px; }
.compare-title svg { width: 18px; height: 18px; color: var(--primary-50); }
.compare-item { padding: 12px 14px; border-bottom: 1px solid var(--stroke-subtle); }
.compare-item:last-child { border-bottom: none; }
.compare-item-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.compare-item-rank { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; flex-shrink: 0; }
.compare-item-rank.best { background: var(--sparkle-20); color: var(--sparkle-70); }
.compare-item-rank.alt { background: var(--grey-20); color: var(--text-low); }
.compare-item-name { font-size: 14px; font-weight: 700; flex: 1; }
.compare-item-best-tag { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: var(--sparkle-20); color: var(--sparkle-70); text-transform: uppercase; letter-spacing: 0.3px; }
.compare-item-price { font-size: 16px; font-weight: 900; color: var(--primary-50); }
.compare-details { display: flex; gap: var(--spacing-m); }
.compare-detail { flex: 1; }
.compare-detail-label { font-size: 10px; font-weight: 700; color: var(--text-disabled); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.compare-detail-val { font-size: 12px; font-weight: 500; color: var(--text-high); line-height: 1.4; }
.compare-detail-rating { display: flex; align-items: center; gap: 2px; }
.compare-detail-rating svg { width: 12px; height: 12px; color: var(--secondary-50); }
.compare-detail-rating span { font-size: 13px; font-weight: 700; color: var(--secondary-60); }

/* Ingredient explainer */
.ingredient-card { background: var(--primary-20); border-radius: var(--shape-lg); padding: 14px; width: 100%; }
.ingredient-title { font-size: 13px; font-weight: 700; color: var(--primary-60); margin-bottom: 8px; }
.ingredient-item { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text-high); }
.ingredient-item:last-child { margin-bottom: 0; }
.ingredient-bullet { color: var(--primary-50); flex-shrink: 0; font-weight: 700; }

/* Profile summary */
.profile-card { background: var(--sparkle-20); border-radius: var(--shape-lg); padding: 14px; width: 100%; display: flex; align-items: center; gap: 12px; }
.profile-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--sparkle-50); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.profile-icon svg { width: 20px; height: 20px; color: var(--white); }
.profile-text { flex: 1; font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--sparkle-70); }
.profile-text b { font-weight: 700; }

/* Demo badge */
.demo-badge { display: flex; align-items: center; justify-content: center; padding: 6px 12px; background: var(--grey-20); border-radius: var(--shape-pill); font-size: 12px; font-weight: 700; color: var(--text-low); margin: 0 auto 8px; width: fit-content; }

/* === BOTTOM WIDGET (Live Music Companion style) === */
.bottom-widget { padding: 8px var(--spacing-s) 12px; background: var(--white); flex-shrink: 0; }
.bw-container { background: var(--surface-ghost); border-radius: 24px; padding: 4px; display: flex; flex-direction: column; }
.bw-input { padding: 10px 12px 4px; }
.bw-real-input { width: 100%; border: none; outline: none; font-family: 'JioType', sans-serif; font-size: 14px; color: var(--text-high); background: transparent; }
.bw-real-input::placeholder { color: var(--text-low); }
.bw-actions { display: flex; justify-content: space-between; align-items: center; height: 40px; padding: 0 4px; }
.bw-left { display: flex; gap: 2px; }
.wib { width: 36px; height: 36px; border-radius: var(--shape-pill); display: flex; align-items: center; justify-content: center; background: transparent; border: none; cursor: pointer; color: var(--grey-80); }
.wib:active { background: var(--surface-moderate); }
.wib svg { width: 20px; height: 20px; }
.bw-send { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--primary-50); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.bw-send svg { width: 18px; height: 18px; fill: var(--white); }

.speak-btn { background: var(--primary-50); border: none; border-radius: var(--shape-pill); padding: 10px 18px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
.speak-btn svg { width: 16px; height: 16px; fill: var(--white); }
.speak-btn span { font-family: 'JioType', sans-serif; font-weight: 700; font-size: 14px; color: var(--white); }

// === ELEVENLABS TTS ===
const TTS_KEY = 'sk_86a2daf2318ba84afa5190ff9a2c09fcc9e7f9dafea1fe79';
const TTS_VOICE = '21m00Tcm4TlvDq8ikWAM'; // Rachel
let currentAudio = null;

async function speakText(text, btn) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.tts-btn.playing').forEach(b => b.classList.remove('playing'));
  if (btn) btn.classList.add('playing');
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${TTS_VOICE}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'xi-api-key': TTS_KEY },
      body: JSON.stringify({ text, model_id: 'eleven_multilingual_v2', voice_settings: { stability: 0.5, similarity_boost: 0.75 } })
    });
    if (!res.ok) throw new Error('TTS failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => { if(btn) btn.classList.remove('playing'); currentAudio = null; };
    currentAudio.play();
  } catch(e) { console.log('TTS error:', e); if(btn) btn.classList.remove('playing'); }
}

function toggleSendBtn() {
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const speakBtn = document.getElementById('speakBtn');
  if (input && sendBtn && speakBtn) {
    if (input.value.trim()) {
      sendBtn.classList.remove('hidden-send');
      speakBtn.style.display = 'none';
    } else {
      sendBtn.classList.add('hidden-send');
      speakBtn.style.display = '';
    }
  }
}

// === ROUTING ===
function handleSend() {
  const text = chatInput.value.trim(); if (!text) return; chatInput.value = '';
  const lower = text.toLowerCase();
  if (lower.includes('shampoo') || lower.includes('hair') || lower.includes('conditioner') || lower.includes('baal')) {
    addUser(text); activeCat = 'hair';
    if (lower.includes('suggest') || lower.includes('recommend') || lower.includes('dry')) startHairAdvisor();
    else startHairOrder();
  } else if (lower.includes('lipstick') || lower.includes('foundation') || lower.includes('kajal') || lower.includes('eyeliner') || lower.includes('makeup') || lower.includes('mac')) {
    addUser(text); activeCat = 'makeup';
    if (lower.includes('suggest') || lower.includes('recommend')) startMakeupAdvisor();
    else startMakeupOrder();
  } else if (lower.includes('sunscreen') || lower.includes('moistur') || lower.includes('serum') || lower.includes('order')) {
    addUser(text); activeCat = 'skin'; runFlow1Fresh();
  } else if (lower.includes('repeat') || lower.includes('last order') || lower.includes('reorder')) {
    addUser(text); runFlow1Reorder();
  } else if (lower.includes('refill') || lower.includes('restock') || lower.includes('running low') || lower.includes('replenish') || lower.includes('alert')) {
    addUser(text); startFlow2();
  } else if (lower.includes('skin') || lower.includes('sunscreen') && lower.includes('recommend')) {
    addUser(text); activeCat = 'skin'; runFlow3();
  } else if (lower.includes('recommend') || lower.includes('suggest') || lower.includes('advisor') || lower.includes('mere liye')) {
    addUser(text); // Ambiguous — use current category
    if (activeCat === 'hair') startHairAdvisor();
    else if (activeCat === 'makeup') startMakeupAdvisor();
    else runFlow3();
  } else {
    addUser(text); showTyping();
    setTimeout(() => { hideTyping();
      addAI('I can help with that! You can order beauty products, check refill alerts, or get personalised skin recommendations.');
      showWelcomeCards();
    }, 1000);
  }
}
